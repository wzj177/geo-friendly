name: CI

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main, develop ]
    workflow_dispatch:

jobs:
    test:
        name: PHP ${{ matrix.php-version }} Test
        runs-on: ubuntu-latest
        strategy:
            matrix:
                php-version: ['8.2', '8.3', '8.4']
            fail-fast: false

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-version }}
                  extensions: mbstring, xml, json
                  coverage: xdebug
                  tools: composer:v2

            - name: Get Composer Cache Directory
              id: composer-cache
              run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

            - name: Cache Composer dependencies
              uses: actions/cache@v4
              with:
                  path: ${{ steps.composer-cache.outputs.dir }}
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Validate composer.json
              run: composer validate --strict

            - name: Run PHPStan analysis
              run: composer analyse

            - name: Run PHPUnit tests with coverage
              run: vendor/bin/phpunit --coverage-clover=coverage.xml --coverage-text

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  file: ./coverage.xml
                  flags: php-${{ matrix.php-version }}
                  name: codecov-php-${{ matrix.php-version }}
                  fail_ci_if_error: false
                  token: ${{ secrets.CODECOV_TOKEN }}

            - name: Archive coverage reports
              if: matrix.php-version == '8.3'
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-reports
                  path: |
                      coverage.xml
                      coverage/

    code-quality:
        name: Code Quality Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, xml, json
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Check coding style (dry-run)
              run: |
                  if [ -f "phpcs.xml" ] || [ -f "phpcs.xml.dist" ]; then
                      vendor/bin/phpcs --dry-run
                  else
                      echo "No PHPCS configuration found, skipping style check"
                  fi
              continue-on-error: true

            - name: Verify composer.json is valid
              run: composer validate --strict --no-check-all

    security:
        name: Security Audit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Security audit (composer)
              run: composer audit
              continue-on-error: true

    build:
        name: Build Verification
        runs-on: ubuntu-latest
        needs: [test, code-quality]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: mbstring, xml, json
                  tools: composer:v2

            - name: Install dependencies
              run: composer install --prefer-dist --no-progress --no-interaction

            - name: Verify autoloader
              run: composer dump-autoload --optimize --strict-psr

            - name: Check for syntax errors
              run: find src -name "*.php" -print0 | xargs -0 -n1 php -l
